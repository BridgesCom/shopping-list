<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Список</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">

  <!-- iOS standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Список">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <style>
    :root {
      --accent: #4f46e5;
      --bg: #f4f4f7;
      --card: #ffffff;
      --text: #1c1c22;
      --muted: #8a8a96;
      --line: #e6e6ec;
      --danger: #e5484d;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f14;
        --card: #1c1c24;
        --text: #f2f2f5;
        --muted: #8a8a96;
        --line: #2a2a34;
      }
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Хедер */
    header {
      background: var(--accent);
      color: #fff;
      padding: calc(env(safe-area-inset-top) + 14px) 18px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    /* Форма додавання */
    .add-bar {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: calc(env(safe-area-inset-top) + 50px);
      z-index: 9;
    }
    .add-bar input {
      flex: 1;
      font-size: 17px;
      padding: 13px 15px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .add-bar input:focus { border-color: var(--accent); }
    .add-bar button {
      width: 50px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 26px;
      font-weight: 300;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    .add-bar button:active { opacity: .8; }

    /* Список */
    main { flex: 1; padding: 8px 16px 16px; }
    ul { list-style: none; margin: 0; padding: 0; }
    li {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card);
      border-radius: 14px;
      padding: 15px 16px;
      margin-top: 10px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--line);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    li.done .check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .check svg { width: 15px; height: 15px; opacity: 0; }
    li.done .check svg { opacity: 1; }
    .label {
      flex: 1;
      font-size: 17px;
      word-break: break-word;
      cursor: pointer;
    }
    li.done .label { color: var(--muted); text-decoration: line-through; }
    .del {
      border: none;
      background: none;
      color: var(--muted);
      font-size: 22px;
      padding: 4px 6px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .del:active { color: var(--danger); }

    /* Порожній стан */
    .empty {
      text-align: center;
      color: var(--muted);
      margin-top: 60px;
      font-size: 16px;
      line-height: 1.5;
    }
    .empty .big { font-size: 46px; display: block; margin-bottom: 10px; }

    /* Підвал */
    footer {
      position: sticky;
      bottom: 0;
      background: var(--card);
      border-top: 1px solid var(--line);
      padding: 12px 18px calc(env(safe-area-inset-bottom) + 12px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--muted);
    }
    footer button {
      border: none;
      background: none;
      color: var(--accent);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px;
    }
    footer button:disabled { color: var(--muted); opacity: .5; }

    /* Перемикач списків + кнопки в хедері */
    .list-picker {
      background: rgba(255,255,255,.18);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 16px;
      font-weight: 700;
      max-width: 55%;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }
    .list-picker option { color: #1c1c22; }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .hbtn {
      background: rgba(255,255,255,.22);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .hbtn:active { opacity: .8; }
    .hbtn[hidden] { display: none; }

    .logout {
      background: rgba(255,255,255,.22);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .logout:active { opacity: .8; }
    .logout[hidden] { display: none; }

    /* Банер запрошення */
    .join-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      background: #eef0ff;
      color: #1c1c22;
      border-bottom: 1px solid var(--line);
      font-size: 15px;
    }
    @media (prefers-color-scheme: dark) { .join-banner { background: #23234a; color: #f2f2f5; } }
    .join-banner[hidden] { display: none; }
    .join-banner button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Екран входу */
    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px calc(env(safe-area-inset-right) + 24px) 24px calc(env(safe-area-inset-left) + 24px);
    }
    .login-card { text-align: center; max-width: 320px; }
    .login-emoji { font-size: 64px; line-height: 1; }
    .login-card h2 { margin: 14px 0 6px; color: var(--text); font-size: 22px; }
    .login-card p { color: var(--muted); margin: 0 0 26px; font-size: 15px; }
    .google-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #fff;
      color: #1f1f1f;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }
    .google-btn:active { opacity: .85; }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-emoji">🛒</div>
      <h2>Список покупок</h2>
      <p>Увійди, щоб бачити свій список</p>
      <button id="loginBtn" class="google-btn">Увійти через Google</button>
    </div>
  </div>

  <header>
    <select id="listPicker" class="list-picker" aria-label="Вибір списку"></select>
    <div class="header-actions">
      <button id="shareBtn" class="hbtn" hidden>Поділитися</button>
      <button id="logoutBtn" class="logout" hidden>Вийти</button>
    </div>
  </header>

  <div id="joinBanner" class="join-banner" hidden>
    <span>Вас запросили до спільного списку.</span>
    <button id="joinBtn">Приєднатися</button>
  </div>

  <form class="add-bar" id="addForm">
    <input id="newItem" type="text" placeholder="Що купити?" autocomplete="off"
           autocorrect="off" enterkeyhint="done">
    <button type="submit" aria-label="Додати">+</button>
  </form>

  <main>
    <ul id="list"></ul>
    <div class="empty" id="empty">
      <span class="big">📝</span>
      Список порожній.<br>Додай перший пункт згори.
    </div>
  </main>

  <footer>
    <span id="counter">0 пунктів</span>
    <button id="clearDone" disabled>Очистити куплене</button>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import {
      initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
      collection, query, orderBy, onSnapshot, setDoc, arrayUnion,
      addDoc, updateDoc, deleteDoc, doc, getDocs, where, writeBatch, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
    import {
      initializeAuth, indexedDBLocalPersistence, browserLocalPersistence, browserPopupRedirectResolver,
      GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

    // --- Firebase (web-конфіг публічний за дизайном; захист — у Security Rules) ---
    const firebaseConfig = {
      apiKey: "AIzaSyAnwNQRaj3eoFppY_WHh9Ux_mUuFYOsBJg",
      authDomain: "shop-list-4c6ae.firebaseapp.com",
      projectId: "shop-list-4c6ae",
      storageBucket: "shop-list-4c6ae.firebasestorage.app",
      messagingSenderId: "252207791118",
      appId: "1:252207791118:web:75386133625cca6480905f"
    };
    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, {
      localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
    });
    const auth = initializeAuth(app, {
      persistence: [indexedDBLocalPersistence, browserLocalPersistence],
      popupRedirectResolver: browserPopupRedirectResolver
    });
    const provider = new GoogleAuthProvider();

    // --- DOM ---
    const loginScreen = document.getElementById('loginScreen');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const shareBtn = document.getElementById('shareBtn');
    const listPicker = document.getElementById('listPicker');
    const joinBanner = document.getElementById('joinBanner');
    const joinBtn = document.getElementById('joinBtn');
    const listEl = document.getElementById('list');
    const emptyEl = document.getElementById('empty');
    const counterEl = document.getElementById('counter');
    const clearBtn = document.getElementById('clearDone');
    const form = document.getElementById('addForm');
    const input = document.getElementById('newItem');

    let currentUser = null;
    let myLists = [];          // [{ id, ownerId, ownerName, members }]
    let activeListId = null;
    let items = [];            // { id, text, done, createdAt }
    let itemsCol = null;
    let unsubItems = null;     // відписка від слухача пунктів
    let unsubLists = null;     // відписка від слухача списків
    let pendingJoin = null;    // listId із ?join=

    // Прочитати запрошення з URL
    (() => {
      const j = new URLSearchParams(location.search).get('join');
      if (j) pendingJoin = j;
    })();

    const CHECK_SVG =
      '<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" ' +
      'stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    function render() {
      listEl.innerHTML = '';
      const sorted = [...items].sort((a, b) => Number(a.done) - Number(b.done));
      for (const it of sorted) {
        const li = document.createElement('li');
        li.className = it.done ? 'done' : '';
        li.dataset.id = it.id;
        li.innerHTML =
          '<span class="check" data-act="toggle">' + CHECK_SVG + '</span>' +
          '<span class="label" data-act="toggle"></span>' +
          '<button class="del" data-act="del" aria-label="Видалити">&times;</button>';
        li.querySelector('.label').textContent = it.text;
        listEl.appendChild(li);
      }
      const total = items.length;
      const done = items.filter(i => i.done).length;
      emptyEl.style.display = total ? 'none' : 'block';
      counterEl.textContent = total
        ? (total + ' ' + plural(total) + ' · ' + done + ' куплено')
        : '0 пунктів';
      clearBtn.disabled = done === 0;
    }

    function plural(n) {
      const m10 = n % 10, m100 = n % 100;
      if (m10 === 1 && m100 !== 11) return 'пункт';
      if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return 'пункти';
      return 'пунктів';
    }

    // --- Перемикач списків ---
    function listLabel(l) {
      if (currentUser && l.id === currentUser.uid) return 'Мій список';
      return l.ownerName ? ('Список: ' + l.ownerName) : 'Спільний список';
    }
    function renderPicker() {
      listPicker.innerHTML = '';
      for (const l of myLists) {
        const opt = document.createElement('option');
        opt.value = l.id;
        opt.textContent = listLabel(l);
        listPicker.appendChild(opt);
      }
      if (activeListId) listPicker.value = activeListId;
    }

    function setActiveList(listId) {
      if (!listId) return;
      activeListId = listId;
      if (myLists.some(l => l.id === listId)) listPicker.value = listId;
      if (unsubItems) { unsubItems(); unsubItems = null; }
      itemsCol = collection(db, 'lists', listId, 'items');
      unsubItems = onSnapshot(query(itemsCol, orderBy('createdAt')),
        snap => { items = snap.docs.map(d => ({ id: d.id, ...d.data() })); render(); },
        err => console.error('items onSnapshot:', err)
      );
    }

    listPicker.addEventListener('change', () => setActiveList(listPicker.value));

    // --- Авторизація ---
    loginBtn.addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (err) {
        console.error('popup-вхід не вдався, пробую redirect:', err && err.code);
        try { await signInWithRedirect(auth, provider); }
        catch (e) { console.error('redirect-вхід:', e && e.code); }
      }
    });
    logoutBtn.addEventListener('click', () => signOut(auth));

    getRedirectResult(auth).catch(err => console.error('redirect:', err));

    onAuthStateChanged(auth, async user => {
      currentUser = user;
      if (user) {
        loginScreen.style.display = 'none';
        logoutBtn.hidden = false;
        shareBtn.hidden = false;
        await startForUser(user);
      } else {
        loginScreen.style.display = 'flex';
        logoutBtn.hidden = true;
        shareBtn.hidden = true;
        joinBanner.hidden = true;
        if (unsubItems) { unsubItems(); unsubItems = null; }
        if (unsubLists) { unsubLists(); unsubLists = null; }
        itemsCol = null; activeListId = null; myLists = []; items = [];
        renderPicker(); render();
      }
    });

    async function startForUser(user) {
      // 1) Гарантуємо власний список — arrayUnion НЕ стирає вже доданих учасників.
      try {
        await setDoc(doc(db, 'lists', user.uid),
          { ownerId: user.uid, ownerName: user.displayName || 'Без імені', members: arrayUnion(user.uid) },
          { merge: true });
      } catch (e) { console.error('ensureOwnList:', e); }

      // 2) Банер запрошення, якщо прийшли за чужим посиланням
      joinBanner.hidden = !pendingJoin || pendingJoin === user.uid;

      // 3) Слухаємо всі списки, де я учасник
      if (unsubLists) unsubLists();
      unsubLists = onSnapshot(
        query(collection(db, 'lists'), where('members', 'array-contains', user.uid)),
        snap => {
          myLists = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          renderPicker();
          if (!activeListId || !myLists.some(l => l.id === activeListId)) {
            const prefer =
              (pendingJoin && myLists.some(l => l.id === pendingJoin)) ? pendingJoin :
              (myLists.some(l => l.id === user.uid) ? user.uid :
              (myLists[0] && myLists[0].id));
            if (prefer) setActiveList(prefer);
            else { items = []; render(); }
          }
        },
        err => console.error('lists onSnapshot:', err)
      );
    }

    // --- Приєднання за посиланням ---
    joinBtn.addEventListener('click', async () => {
      if (!pendingJoin || !currentUser) return;
      try {
        await updateDoc(doc(db, 'lists', pendingJoin), { members: arrayUnion(currentUser.uid) });
        const joined = pendingJoin;
        pendingJoin = null;
        joinBanner.hidden = true;
        history.replaceState(null, '', location.pathname);
        setActiveList(joined);
      } catch (e) {
        console.error('join:', e);
        alert('Не вдалося приєднатися. Можливо, посилання застаріле або недійсне.');
      }
    });

    // --- Поділитися списком ---
    shareBtn.addEventListener('click', async () => {
      if (!activeListId) return;
      const url = location.origin + location.pathname + '?join=' + activeListId;
      try {
        if (navigator.share) {
          await navigator.share({ title: 'Список покупок', text: 'Приєднуйся до спільного списку:', url });
        } else {
          await navigator.clipboard.writeText(url);
          alert('Посилання скопійовано:\n' + url);
        }
      } catch (e) { /* користувач скасував — це нормально */ }
    });

    // --- Дії над пунктами ---
    async function addItem(text) {
      text = text.trim();
      if (!text || !itemsCol) return;
      try { await addDoc(itemsCol, { text, done: false, createdAt: serverTimestamp() }); }
      catch (e) { console.error('addItem:', e); }
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      addItem(input.value);
      input.value = '';
      input.focus();
    });

    listEl.addEventListener('click', e => {
      const actEl = e.target.closest('[data-act]');
      if (!actEl || !itemsCol) return;
      const li = e.target.closest('li');
      const id = li && li.dataset.id;
      if (!id) return;
      const it = items.find(i => i.id === id);
      if (!it) return;
      if (actEl.dataset.act === 'toggle') {
        updateDoc(doc(itemsCol, id), { done: !it.done }).catch(err => console.error('toggle:', err));
      } else if (actEl.dataset.act === 'del') {
        deleteDoc(doc(itemsCol, id)).catch(err => console.error('del:', err));
      }
    });

    clearBtn.addEventListener('click', async () => {
      if (!itemsCol) return;
      try {
        const doneSnap = await getDocs(query(itemsCol, where('done', '==', true)));
        const batch = writeBatch(db);
        doneSnap.forEach(d => batch.delete(d.ref));
        await batch.commit();
      } catch (e) { console.error('clearDone:', e); }
    });

    // Service worker (офлайн-оболонка)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
